<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍽 오늘 점심 뭐 먹지?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F7F3EF;--card:#fff;
  --text:#2D2A26;--text2:#8A8078;--text3:#B8AEA4;
  --mint:#5BA7A0;--mint-light:#E8F4F2;--mint-dark:#4A918A;
  --coral:#E8836A;--coral-light:#FFF0EC;
  --border:#EDE6DE;--border2:#DDD5CC;
  --r:14px;--r2:20px;
}
body{
  font-family:'Noto Sans KR',system-ui,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100dvh;
  display:flex;justify-content:center;
  -webkit-font-smoothing:antialiased;
}
.app{width:100%;max-width:440px;padding:20px 16px 100px}
button{font-family:inherit;cursor:pointer}

/* Header */
.hdr{text-align:center;padding:24px 0 20px}
.hdr h1{font-size:22px;font-weight:800;margin-bottom:4px}
.hdr p{font-size:13px;color:var(--text2)}

/* Tabs */
.tabs{
  display:flex;gap:8px;margin-bottom:20px;
}
.tab{
  flex:1;padding:10px 0;
  border-radius:12px;border:1.5px solid var(--border2);
  background:var(--card);
  font-size:13px;font-weight:600;
  color:var(--text2);
  transition:all .2s;
}
.tab.on{
  background:var(--mint);color:#fff;
  border-color:var(--mint);
  box-shadow:0 2px 12px rgba(91,167,160,.25);
}
.tab:not(.on):hover{border-color:var(--mint);color:var(--mint)}

/* Categories */
.cats-bar{
  display:flex;align-items:center;gap:8px;
  margin-bottom:10px;
}
.cats-bar .label{font-size:13px;font-weight:600;color:var(--text2);white-space:nowrap}
.cats-bar .cnt{font-size:12px;color:var(--text3);white-space:nowrap}
.cats-bar .sel-all{
  margin-left:auto;
  background:var(--mint);color:#fff;
  border:none;padding:5px 12px;border-radius:8px;
  font-size:12px;font-weight:600;
  white-space:nowrap;transition:background .15s;
}
.cats-bar .sel-all:hover{background:var(--mint-dark)}
.pills{
  display:flex;gap:6px;flex-wrap:wrap;
  margin-bottom:20px;
}
.pill{
  padding:6px 12px;border-radius:20px;
  border:1.5px solid var(--border2);background:var(--card);
  font-size:12px;font-weight:600;color:var(--text2);
  transition:all .15s;white-space:nowrap;
}
.pill.on{border-color:var(--mint);color:var(--mint);background:var(--mint-light)}
.pill:hover{border-color:var(--mint)}

/* Draw area */
.draw-area{
  display:flex;flex-direction:column;align-items:center;
  padding:24px 0;
}
.draw-btn{
  width:100%;padding:16px;
  background:linear-gradient(135deg,var(--mint),var(--mint-dark));
  color:#fff;border:none;border-radius:var(--r);
  font-size:17px;font-weight:700;
  box-shadow:0 4px 16px rgba(91,167,160,.3);
  transition:all .2s;
  letter-spacing:.5px;
}
.draw-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(91,167,160,.4)}
.draw-btn:active{transform:scale(.98)}

/* Result card */
.res-card{
  display:none;
  width:100%;
  background:var(--card);border-radius:var(--r2);
  box-shadow:0 4px 24px rgba(0,0,0,.06);
  overflow:hidden;
  animation:cardIn .5s cubic-bezier(.34,1.56,.64,1);
  margin-bottom:16px;
}
@keyframes cardIn{from{opacity:0;transform:scale(.9) translateY(20px)}to{opacity:1;transform:none}}
.res-card.show{display:block}
.res-emoji{
  display:flex;align-items:center;justify-content:center;
  height:140px;
  background:linear-gradient(135deg,var(--mint-light),#F0F8F6);
  font-size:56px;
  position:relative;overflow:hidden;
}
.res-emoji::after{
  content:'';position:absolute;
  width:200px;height:200px;border-radius:50%;
  background:rgba(91,167,160,.08);
  top:50%;left:50%;transform:translate(-50%,-50%);
}
.res-body{padding:20px 24px 24px;text-align:center}
.res-name{font-size:20px;font-weight:800;margin-bottom:4px}
.res-cat{font-size:13px;color:var(--text2);margin-bottom:16px}
.res-tags{
  display:flex;gap:8px;justify-content:center;flex-wrap:wrap;
  margin-bottom:16px;
}
.res-tag{
  padding:6px 14px;border-radius:10px;
  border:1.5px solid var(--border);
  font-size:12px;font-weight:600;color:var(--text2);
  background:var(--card);
  text-decoration:none;transition:all .15s;
}
.res-tag:hover{border-color:var(--mint);color:var(--mint)}
.res-order{
  display:inline-block;
  padding:10px 24px;border-radius:12px;
  background:var(--mint);color:#fff;
  font-size:14px;font-weight:700;
  border:none;text-decoration:none;
  transition:all .15s;
}
.res-order:hover{background:var(--mint-dark)}

/* Retry */
.retry-btn{
  width:100%;padding:14px;
  background:var(--text);color:#fff;
  border:none;border-radius:var(--r);
  font-size:15px;font-weight:700;
  transition:all .15s;
  margin-bottom:20px;
}
.retry-btn:hover{background:#1a1815;transform:translateY(-1px)}
.retry-btn:active{transform:scale(.98)}

/* History */
.hist{
  background:var(--card);border-radius:var(--r);
  border:1.5px solid var(--border);
  padding:14px 16px;
}
.hist-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:8px;
}
.hist-head b{font-size:13px;font-weight:600;color:var(--text2)}
.hist-head .clear{
  background:none;border:none;font-size:12px;
  color:var(--text3);font-weight:500;
  transition:color .15s;
}
.hist-head .clear:hover{color:var(--coral)}
.hist-list{display:flex;flex-direction:column;gap:4px}
.hist-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 10px;border-radius:10px;
  font-size:13px;font-weight:500;
  transition:background .12s;
}
.hist-item:hover{background:#FAF6F2}
.hist-item .h-emoji{font-size:16px;flex-shrink:0}
.hist-item .h-name{flex:1}
.hist-item .h-time{font-size:11px;color:var(--text3)}
.hist-empty{
  font-size:13px;color:var(--text3);text-align:center;padding:8px;
}

/* Manage menu */
.manage{margin-top:16px}
.manage-toggle{
  width:100%;padding:10px;
  background:none;border:1.5px dashed var(--border2);
  border-radius:var(--r);
  font-size:13px;font-weight:600;color:var(--text3);
  transition:all .15s;
}
.manage-toggle:hover{border-color:var(--mint);color:var(--mint)}
.manage-panel{
  display:none;margin-top:10px;
  background:var(--card);border-radius:var(--r);
  border:1.5px solid var(--border);
  padding:14px 16px;
  animation:cardIn .3s ease;
}
.manage-panel.show{display:block}
.manage-panel .add-row{display:flex;gap:6px;margin-bottom:10px}
.manage-panel .add-in{
  flex:1;padding:10px 14px;
  background:#FAF6F2;border:1.5px solid transparent;
  border-radius:10px;font-size:13px;font-weight:500;
  color:var(--text);outline:none;font-family:inherit;
  transition:all .15s;
}
.manage-panel .add-in:focus{background:#fff;border-color:var(--mint)}
.manage-panel .add-in::placeholder{color:#ccc}
.manage-panel .add-bt{
  padding:10px 16px;background:var(--mint);color:#fff;
  border:none;border-radius:10px;font-size:13px;font-weight:700;
  font-family:inherit;white-space:nowrap;
}
.manage-panel .mlist{
  max-height:200px;overflow-y:auto;
  display:flex;flex-wrap:wrap;gap:4px;
}
.manage-panel .mitem{
  display:inline-flex;align-items:center;gap:4px;
  padding:5px 10px;border-radius:8px;
  background:#FAF6F2;font-size:12px;font-weight:500;
}
.manage-panel .mitem .mx{
  background:none;border:none;color:var(--text3);
  font-size:11px;cursor:pointer;padding:0 2px;
  transition:color .15s;
}
.manage-panel .mitem .mx:hover{color:var(--coral)}
.share{
  width:100%;padding:10px;margin-top:10px;
  background:transparent;color:var(--text2);
  border:1.5px dashed var(--border2);border-radius:var(--r);
  font-size:13px;font-weight:600;
  transition:all .15s;
}
.share:hover{border-color:var(--mint);color:var(--mint)}

/* Toast */
.toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(60px);
  background:var(--text);color:#fff;
  padding:12px 24px;border-radius:14px;
  font-size:13px;font-weight:600;
  opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);
  z-index:100;white-space:nowrap;
  box-shadow:0 6px 20px rgba(0,0,0,.15);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Animation */
.drawing .draw-btn{
  animation:pulse 1s ease-in-out infinite;
  pointer-events:none;
}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}

@media(max-width:380px){
  .app{padding:16px 12px 80px}
  .res-emoji{height:120px;font-size:44px}
  .res-name{font-size:18px}
}
</style>
</head>

let tab='nearby',selCats=new Set(),filteredItems=[],pickHistory=[],selectedEmoji=null;
function pickEmoji(el){
  document.querySelectorAll('.emoji-pick').forEach(e=>e.style.background='');
  el.style.background='var(--mint-light)';
  selectedEmoji=el.textContent;
}

function catSource(){
  if(tab==='nearby')return OUT_NEARBY;
  if(tab==='matjip')return OUT_MATJIP;
  return CATS;
}

function getEmoji(name){
  if(INFO[name])return INFO[name].e;
  for(const[k,v]of Object.entries(EMOJIS)){
    if(name.includes(k))return v;
  }
  return'🍽';
}
function getDesc(name){
  if(INFO[name])return INFO[name].d;
  return getCat(name);
}
function getCat(name){
  const src=catSource();
  for(const[cat,list]of Object.entries(src)){
    if(list.includes(name))return cat;
  }
  return'기타';
}

function switchTab(t){
  tab=t;
  document.getElementById('tabNearby').classList.toggle('on',t==='nearby');
  document.getElementById('tabMatjip').classList.toggle('on',t==='matjip');
  document.getElementById('tabDeliv').classList.toggle('on',t==='deliv');
  selCats.clear();
  hideResult();
  buildPills();
  selectAll();
}

function buildPills(){
  const el=document.getElementById('pills');
  el.innerHTML='';
  const src=catSource();
  Object.keys(src).forEach(k=>{
    const p=mk('button','pill'+(selCats.has(k)?' on':''));
    const emoji=EMOJIS[k]||'📦';
    p.textContent=emoji+' '+k+'('+src[k].length+')';
    p.onclick=()=>toggleCat(k);
    el.appendChild(p);
  });
  updateFiltered();
}

function toggleCat(c){
  if(selCats.has(c))selCats.delete(c);else selCats.add(c);
  const src=catSource();
  allSelected=selCats.size===Object.keys(src).length;
  document.getElementById('selAllBtn').textContent=allSelected?'전체 해제':'전체 선택';
  buildPills();
}

let allSelected=true;
function selectAll(){
  selCats.clear();
  const src=catSource();
  Object.keys(src).forEach(k=>selCats.add(k));
  allSelected=true;
  document.getElementById('selAllBtn').textContent='전체 해제';
  buildPills();
}
function deselectAll(){
  selCats.clear();
  allSelected=false;
  document.getElementById('selAllBtn').textContent='전체 선택';
  buildPills();
}
function toggleAll(){
  if(allSelected)deselectAll();else selectAll();
}

function updateFiltered(){
  filteredItems=[];
  const src=catSource();
  selCats.forEach(k=>{if(src[k])filteredItems.push(...src[k])});
  document.getElementById('totalCnt').textContent='총 '+filteredItems.length+'개';
  renderManage();
}

function draw(){
  if(!filteredItems.length){toast('선택된 메뉴가 없어요!');return}

  const area=document.getElementById('drawArea');
  area.classList.add('drawing');
  hideResult();

  const shuffleTime=1200;
  const interval=80;
  let elapsed=0;
  const card=document.getElementById('resCard');
  card.classList.add('show');
  card.style.animation='none';

  const tick=setInterval(()=>{
    elapsed+=interval;
    const ri=Math.floor(Math.random()*filteredItems.length);
    const n=filteredItems[ri];
    document.getElementById('resEmoji').textContent=getEmoji(n);
    document.getElementById('resName').textContent=n;
    document.getElementById('resCat').textContent=getDesc(n);
    if(elapsed>=shuffleTime){
      clearInterval(tick);
      area.classList.remove('drawing');
      // final pick
      const fi=Math.floor(Math.random()*filteredItems.length);
      const winner=filteredItems[fi];
      showResult(winner);
    }
  },interval);
}

function showResult(name){
  const card=document.getElementById('resCard');
  card.classList.add('show');
  card.style.animation='none';
  void card.offsetWidth;
  card.style.animation='cardIn .5s cubic-bezier(.34,1.56,.64,1)';

  document.getElementById('resEmoji').textContent=getEmoji(name);
  document.getElementById('resName').textContent=name;
  document.getElementById('resCat').textContent=getDesc(name);

  // tags
  const tags=document.getElementById('resTags');
  tags.innerHTML='';
  if(tab==='deliv'){
    tags.innerHTML='<span class="res-tag">🛵 배달 주문</span>';
  }else if(tab==='nearby'){
    tags.innerHTML='<span class="res-tag">🏃 도보 3분 이내</span>';
  }else{
    tags.innerHTML='<span class="res-tag">🚶 맛집 탐방</span>';
  }

  document.getElementById('retryBtn').style.display='block';
  document.getElementById('drawBtn').style.display='none';

  // history
  pickHistory.unshift({name,emoji:getEmoji(name),time:new Date().toLocaleTimeString('ko',{hour:'2-digit',minute:'2-digit'})});
  if(pickHistory.length>5)pickHistory.pop();
  renderHist();
}

function hideResult(){
  document.getElementById('resCard').classList.remove('show');
  document.getElementById('retryBtn').style.display='none';
  document.getElementById('drawBtn').style.display='block';
}

function renderHist(){
  const sec=document.getElementById('histSec');
  if(!pickHistory.length){sec.style.display='none';return}
  sec.style.display='block';
  document.getElementById('histCnt').textContent=pickHistory.length;
  const el=document.getElementById('histList');
  el.innerHTML='';
  pickHistory.forEach(h=>{
    const d=mk('div','hist-item');
    d.innerHTML=`<span class="h-emoji">${h.emoji}</span><span class="h-name">${h.name}</span><span class="h-time">${h.time}</span>`;
    el.appendChild(d);
  });
}
function clearHist(){pickHistory=[];renderHist()}

function toggleManage(){
  document.getElementById('managePanel').classList.toggle('show');
}
function renderManage(){
  const el=document.getElementById('mlist');
  el.innerHTML='';
  filteredItems.forEach((t,i)=>{
    const d=mk('span','mitem');
    d.innerHTML=`${t}<button class="mx" onclick="rmItem(${i})">✕</button>`;
    el.appendChild(d);
  });
}
function addItem(){
  const inp=document.getElementById('inp');
  const v=inp.value.trim();
  if(!v){return}
  if(filteredItems.includes(v)){toast('이미 있는 메뉴예요!');return}
  const desc=document.getElementById('inpDesc').value.trim();
  const emoji=selectedEmoji||'🍽';
  INFO[v]={e:emoji,d:desc||'기타'};
  const src=catSource();
  if(!src['기타'])src['기타']=[];
  src['기타'].push(v);
  selCats.add('기타');
  inp.value='';
  document.getElementById('inpDesc').value='';
  selectedEmoji=null;
  document.querySelectorAll('.emoji-pick').forEach(el=>el.style.background='');
  buildPills();
  toast('✅ 추가되었어요!');
}
function rmItem(i){
  const name=filteredItems[i];
  const src=catSource();
  Object.values(src).forEach(list=>{
    const idx=list.indexOf(name);
    if(idx>-1)list.splice(idx,1);
  });
  buildPills();
}

function shareURL(){
  const data={tab,items:filteredItems};
  const enc=btoa(unescape(encodeURIComponent(JSON.stringify(data))));
  window.history.replaceState(null,'','#'+enc);
  navigator.clipboard.writeText(location.href)
    .then(()=>toast('📋 URL 복사 완료!'))
    .catch(()=>toast('복사 실패 😢'));
}

function mk(tag,cls){const e=document.createElement(tag);e.className=cls;return e}
function toast(m){
  const t=document.getElementById('toast');
  t.textContent=m;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// init
switchTab('nearby');
